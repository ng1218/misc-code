- name: Download repo file
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/rhel/docker-ce.repo
    dest: /etc/yum.repos.d/docker-ce.repo

- name: Install Docker
  ansible.builtin.dnf:
    name: docker-ce
    state: installed

- name: Start Docker
  ansible.builtin.systemd_service:
    name: docker
    state: restarted
    enabled: yes
    daemon-reload: yes

- name: Provide sock file permissions
  ansible.builtin.shell: chmod o+rw /var/run/docker.sock

- name: Get github runner registration token
  ansible.builtin.shell: |
    gh api --method POST -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" /orgs/nareshgdevops/actions/runners/registration-token | jq .token | xargs
  delegate_to: localhost
  register: gh_org_token

- name: Create Runner Containers
  loop:
    - runner-1
    - runner-2
    - runner-3
  community.docker.docker_container:
    name: "{{ item }}"
    image: ng1218/github-runner
    pull: always
    state: started
    restart: true
    volumes:
      /var/run/docker.sock:/var/run/docker.sock
    restart_policy: always
    env:
      ORG: "{{ lookup('community.hashi_vault.hashi_vault', 'secret=roboshop-infra/data/github-runner:ORG token={{ token }} url=http://vault-int.nareshdevops1218.online:8200') }}"
      TOKEN: "{{ gh_org_token.stdout }}"
      NAME: "{{ item }}"
      AZURE_CLIENT_ID: "{{ lookup('community.hashi_vault.hashi_vault', 'secret=roboshop-infra/data/azure-service-priniciple:AZURE_CLIENT_ID token={{ token }} url=http://vault-int.nareshdevops1218.online:8200') }}"
      AZURE_SECRET: "{{ lookup('community.hashi_vault.hashi_vault', 'secret=roboshop-infra/data/azure-service-priniciple:AZURE_SECRET token={{ token }} url=http://vault-int.nareshdevops1218.online:8200') }}"
      AZURE_TENANT: "{{ lookup('community.hashi_vault.hashi_vault', 'secret=roboshop-infra/data/azure-service-priniciple:AZURE_TENANT token={{ token }} url=http://vault-int.nareshdevops1218.online:8200') }}"

