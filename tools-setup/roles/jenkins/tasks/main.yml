- name: Copy Jenkins repo file
  ansible.builtin.template:
    src: jenkins.repo
    dest: /etc/yum.repos.d/jenkins.repo

- name: Install required dependencies
  ansible.builtin.dnf:
    name:
      - java-21-openjdk
      - fontconfig
    state: installed

- name: Install Jenkins
  ansible.builtin.dnf:
    name: jenkins
    state: installed

- name: Ensure Jenkins is stopped before plugin installation
  ansible.builtin.systemd:
    name: jenkins
    enabled: false
    state: stopped

- name: Copy plugin list
  ansible.builtin.template:
    src: plugins.txt
    dest: /tmp/plugins.txt

- name: Download plugin CLI
  ansible.builtin.get_url:
    url: https://github.com/jenkinsci/plugin-installation-manager-tool/releases/download/2.14.0/jenkins-plugin-manager-2.14.0.jar
    dest: /tmp/jenkins-plugin-manager.jar

- name: Install plugins
  ansible.builtin.command: >
    java -jar /tmp/jenkins-plugin-manager.jar
    --plugin-file /tmp/plugins.txt
    --plugin-download-directory /var/lib/jenkins/plugins
  become: true
  become_user: jenkins

- name: Copy JCasC config
  ansible.builtin.template:
    src: jenkins.yaml
    dest: /var/lib/jenkins/jenkins.yaml
    owner: jenkins
    group: jenkins
    mode: '0644'

- name: Bypass Setup Wizard (Systemd Override)
  ansible.builtin.file:
    path: /etc/systemd/system/jenkins.service.d
    state: directory

- name: Set Jenkins systemd override
  ansible.builtin.copy:
    dest: /etc/systemd/system/jenkins.service.d/override.conf
    content: |
      [Service]
      Environment="JAVA_OPTS=-Djava.awt.headless=true -Djenkins.install.runSetupWizard=false"
      Environment="CASC_JENKINS_CONFIG=/var/lib/jenkins/jenkins.yaml"

- name: Reload systemd manager (required for env changes)
  ansible.builtin.command: systemctl daemon-reexec

- name: Reload systemd units
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart Jenkins
  ansible.builtin.systemd:
    name: jenkins
    state: restarted
    enabled: true