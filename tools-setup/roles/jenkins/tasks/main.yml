- name: Copy Jenkins repo file
  ansible.builtin.template:
    src: jenkins.repo
    dest: /etc/yum.repos.d/jenkins.repo

- name: Install required dependencies
  ansible.builtin.dnf:
    name:
      - java-21-openjdk
      - fontconfig
    state: installed

- name: Install Jenkins
  ansible.builtin.dnf:
    name: jenkins
    state: installed

- name: Bypass Setup Wizard (Systemd Override)
  ansible.builtin.file:
    path: /etc/systemd/system/jenkins.service.d
    state: directory

- name: Set JAVA_OPTS to skip wizard
  ansible.builtin.copy:
    dest: /etc/systemd/system/jenkins.service.d/override.conf
    content: |
      [Service]
      Environment="JAVA_OPTS=-Djava.awt.headless=true -Djenkins.install.runSetupWizard=false"

- name: Create Jenkins init script directory
  ansible.builtin.file:
    path: /var/lib/jenkins/init.groovy.d
    state: directory
    owner: azuser
    group: azuser
    mode: '0755'

- name: Create initial admin user via Init Script
  ansible.builtin.copy:
    dest: /var/lib/jenkins/init.groovy.d/basic-security.groovy
    owner: azuser
    group: azuser
    mode: '0644'
    content: |
      import jenkins.model.*
      import hudson.security.*
      import jenkins.install.*

      def instance = Jenkins.getInstance()

      // Define the user and security realm
      def hudsonRealm = new HudsonPrivateSecurityRealm(false)
      hudsonRealm.createAccount("admin", "admin")
      instance.setSecurityRealm(hudsonRealm)

      // Grant full control and mark setup as complete
      def strategy = new FullControlOnceLoggedInAuthorizationStrategy()
      instance.setAuthorizationStrategy(strategy)
      
      // Crucial: Mark the install as finished to avoid further setup blocks
      InstallState.INITIAL_SETUP_COMPLETED.initializeState()
      
      instance.save()

- name: Start Jenkins
  ansible.builtin.systemd_service:
    name: jenkins
    state: restarted
    enabled: true
    daemon_reload: true

- name: Wait for Jenkins to be ready on port 8080
  ansible.builtin.wait_for:
    port: 8080
    delay: 10        # Wait 10 seconds before starting to check
    timeout: 300     # Stop trying after 5 minutes
    state: started

- name: Install suggested plugins
  community.general.jenkins_plugin:
    name: "{{ item }}"
    url: "http://jenkins.nareshdevops1218.online:8080"
    url_username: "admin"
    url_password: "admin"
    state: present
  loop:
    - git
    - workflow-aggregator
    - ssh-slaves
    - credentials-binding

