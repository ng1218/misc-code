- name: Copy Jenkins repo file
  ansible.builtin.template:
    src: jenkins.repo
    dest: /etc/yum.repos.d/jenkins.repo

- name: Install required dependencies
  ansible.builtin.dnf:
    name:
      - java-21-openjdk
      - fontconfig
    state: installed

- name: Install Jenkins
  ansible.builtin.dnf:
    name: jenkins
    state: installed

- name: Bypass Setup Wizard (Systemd Override)
  ansible.builtin.file:
    path: /etc/systemd/system/jenkins.service.d
    state: directory

- name: Set JAVA_OPTS to skip wizard
  ansible.builtin.copy:
    dest: /etc/systemd/system/jenkins.service.d/override.conf
    content: |
      [Service]
      Environment="JAVA_OPTS=-Djava.awt.headless=true -Djenkins.install.runSetupWizard=false"

- name: Start Jenkins
  ansible.builtin.systemd_service:
    name: jenkins
    state: restarted
    enabled: true
    daemon_reload: true

- name: Install suggested plugins
  community.general.jenkins_plugin:
    name: "{{ item }}"
    url: "http://jenkins.nareshdevops1218.online:8080"
    url_username: "admin"
    url_password: "admin"
    state: present
  loop:
    - git
    - workflow-aggregator
    - ssh-slaves
    - credentials-binding

- name: Add SSH Private Key Credential
  community.general.jenkins_credential:
    url: "http://jenkins.nareshdevops1218.online:8080"
    user: "admin"
    password: "admin"
    name: "agent-ssh-key"
    cls: "com.cloudbees.plugins.credentials.impl.UsernamePasswordCredentialsImpl"
    username: "jenkins"
    password: "devops@12345"
    state: present

- name: Create SSH Agent Node
  community.general.jenkins_node:
    url: "http://jenkins.nareshdevops1218.online:8080"
    user: "admin"
    password: "admin"
    name: "rhel-ssh-agent"
    remote_fs: "/home/jenkins"
    launcher: "ssh"
    host: "jenkins-agent.nareshdevops1218.online:8080"
    credentials_id: "agent-ssh-key"
    num_executors: 5
    labels: myfirstagent
    state: present