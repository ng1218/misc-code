credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "agent-ssh-key"
              username: "jenkins"
              password: "devops@12345"
              description: "Username/password credential"
jenkins:
  systemMessage: "Managed by Ansible"

  numExecutors: 0

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: admin
          password: admin

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  nodes:
      - permanent:
          name: "rhel-ssh-agent"
          remoteFS: "/home/jenkins"
          numExecutors: 5
          labelString: "myfirstagent"
          launcher:
            ssh:
              host: "jenkins-agent.nareshdevops1218.online"
              port: 22
              credentialsId: "agent-ssh-key"

jobs:
  - script: >
      job('seed-job') {
        description('Seed job created via JCasC')

        scm {
          git {
            remote {
              url('https://github.com/nareshgdevops/jenkins')
            }
            branch('main')
          }
        }

        triggers {
          scm('H H * * *')
        }

        steps {
          shell('''
            cd seed-job
            make
          ''')
        }
      }